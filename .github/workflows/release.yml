name: Release

# v* タグのpushでDMGをビルドしてGitHub Releaseに添付する。
#
# GitHub Secrets が設定されていれば Developer ID 署名 + Apple 公証まで自動化し、
# 未設定なら ad-hoc 署名にフォールバックする（DMGは必ず生成される）。
#
# 必要な Secrets（設定方法は RUNBOOK-signing.md）:
#   DEVELOPER_ID_CERT_P12       … Developer ID Application 証明書(.p12)のbase64
#   DEVELOPER_ID_CERT_PASSWORD  … 上記 .p12 のエクスポート時パスワード
#   ASC_KEY_ID                  … App Store Connect APIキーの Key ID
#   ASC_ISSUER_ID               … 同 Issuer ID
#   ASC_KEY_P8                  … 同 APIキー(.p8)のbase64
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  TEAM_ID: 6RSL327PX8
  SIGN_IDENTITY: "Developer ID Application: SHINNOSUKE IRIE (6RSL327PX8)"

jobs:
  release:
    name: DMGビルドとRelease作成
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: バージョン抽出
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: 署名・公証の可否を判定
        id: caps
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          ASC_KEY: ${{ secrets.ASC_KEY_P8 }}
        run: |
          if [ -n "$CERT_P12" ]; then
            echo "sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "sign=false" >> "$GITHUB_OUTPUT"
            echo "::warning::署名用Secret未設定のためad-hoc署名で配布します"
          fi
          if [ -n "$CERT_P12" ] && [ -n "$ASC_KEY" ]; then
            echo "notarize=true" >> "$GITHUB_OUTPUT"
          else
            echo "notarize=false" >> "$GITHUB_OUTPUT"
          fi

      - name: パッケージテスト
        run: |
          for pkg in DNGKit DecodeKit CacheKit XMPKit; do
            swift test --package-path "Packages/$pkg"
          done

      - name: アプリビルド (Release, 署名なし)
        run: |
          xcodebuild -project F.xcodeproj -scheme F -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO build

      - name: 署名証明書をインポート
        if: steps.caps.outputs.sign == 'true'
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          echo "$CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          # codesign が非対話で秘密鍵を使えるようACLを開放
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH" >/dev/null
          # 検索対象キーチェーンに追加（既存を維持しつつ先頭に）
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed 's/"//g')
          rm -f "$CERT_PATH"

      - name: アプリ署名 (Developer ID + hardened runtime)
        if: steps.caps.outputs.sign == 'true'
        run: |
          APP="build/DerivedData/Build/Products/Release/F.app"
          # Sparkle.framework の入れ子から先に明示的に署名する。
          # --deep は Downloader.xpc の sandbox entitlements を剥がして
          # 更新のダウンロードを壊すため使わない（Sparkle公式の推奨手順）
          SPARKLE="$APP/Contents/Frameworks/Sparkle.framework"
          if [ -d "$SPARKLE" ]; then
            # CODE_SIGNING_ALLOWED=NO ビルドで元の entitlements が失われるため、
            # Downloader.xpc（サンドボックス化されたダウンロード用XPC）には明示的に付け直す
            cat > "$RUNNER_TEMP/downloader.entitlements" <<'ENTITLEMENTS'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.app-sandbox</key><true/>
            <key>com.apple.security.network.client</key><true/>
          </dict>
          </plist>
          ENTITLEMENTS
            sed -i '' 's/^          //' "$RUNNER_TEMP/downloader.entitlements"
            codesign --force --options runtime --timestamp \
              --entitlements "$RUNNER_TEMP/downloader.entitlements" \
              --sign "$SIGN_IDENTITY" "$SPARKLE/Versions/B/XPCServices/Downloader.xpc"
            codesign --force --options runtime --timestamp \
              --sign "$SIGN_IDENTITY" "$SPARKLE/Versions/B/XPCServices/Installer.xpc"
            codesign --force --options runtime --timestamp \
              --sign "$SIGN_IDENTITY" "$SPARKLE/Versions/B/Autoupdate"
            codesign --force --options runtime --timestamp \
              --sign "$SIGN_IDENTITY" "$SPARKLE/Versions/B/Updater.app"
            codesign --force --options runtime --timestamp \
              --sign "$SIGN_IDENTITY" "$SPARKLE"
          fi
          codesign --force --options runtime --timestamp \
            --sign "$SIGN_IDENTITY" "$APP"
          codesign --verify --strict --deep --verbose=2 "$APP"

      - name: アプリ署名 (ad-hoc フォールバック)
        if: steps.caps.outputs.sign == 'false'
        run: |
          APP="build/DerivedData/Build/Products/Release/F.app"
          codesign --force --deep --sign - "$APP"

      - name: DMG作成
        run: |
          APP="build/DerivedData/Build/Products/Release/F.app"
          mkdir -p dmgroot
          cp -R "$APP" dmgroot/
          ln -s /Applications dmgroot/Applications
          hdiutil create -volname "F ${{ steps.version.outputs.version }}" \
            -srcfolder dmgroot -ov -format UDZO \
            "F-${{ steps.version.outputs.version }}.dmg"

      - name: DMG署名
        if: steps.caps.outputs.sign == 'true'
        run: |
          codesign --force --timestamp --sign "$SIGN_IDENTITY" \
            "F-${{ steps.version.outputs.version }}.dmg"

      - name: 公証 + staple
        if: steps.caps.outputs.notarize == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/asc_key.p8"
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "$KEY_PATH"
          DMG="F-${{ steps.version.outputs.version }}.dmg"
          xcrun notarytool submit "$DMG" \
            --key "$KEY_PATH" --key-id "$ASC_KEY_ID" --issuer "$ASC_ISSUER_ID" \
            --wait --timeout 30m
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          rm -f "$KEY_PATH"

      - name: 一時キーチェーン削除
        if: always() && steps.caps.outputs.sign == 'true'
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true

      # Sparkle 自動更新用のフィード。アプリは
      # releases/latest/download/appcast.xml を見るため、毎リリースに添付する。
      # 署名(EdDSA)は staple 後の最終DMGに対して行う必要がある
      - name: Sparkle appcast 生成
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$SPARKLE_ED_PRIVATE_KEY" ]; then
            echo "::warning::SPARKLE_ED_PRIVATE_KEY 未設定のため appcast をスキップ（アプリ内更新は配信されない）"
            exit 0
          fi
          VERSION="${{ steps.version.outputs.version }}"
          DMG="F-$VERSION.dmg"
          SPARKLE_VERSION="2.9.4"
          curl -sL -o sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/$SPARKLE_VERSION/Sparkle-$SPARKLE_VERSION.tar.xz"
          mkdir -p sparkle-dist && tar -xf sparkle.tar.xz -C sparkle-dist bin/sign_update
          KEY_FILE="$RUNNER_TEMP/sparkle_ed_key"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$KEY_FILE"
          SIGNATURE_ATTRS=$(./sparkle-dist/bin/sign_update --ed-key-file "$KEY_FILE" "$DMG")
          rm -f "$KEY_FILE"
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          # 更新ダイアログに出す変更点の箇条書き。直前リリースからのコミットタイトルを
          # 使い、ユーザーに関係ない chore/ci/test は除外、conventional prefix は剥がす
          # （GitHubページを releaseNotesLink で埋め込むと全チュームが表示されて不格好なため、
          #   description に最小HTMLを埋め込む）
          PREV_TAG=$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" -q .tag_name 2>/dev/null || true)
          BULLETS=""
          if [ -n "$PREV_TAG" ]; then
            BULLETS=$(gh api "repos/$GITHUB_REPOSITORY/compare/$PREV_TAG...v$VERSION" \
              -q '.commits[].commit.message | split("\n")[0]' \
              | grep -vE '^(chore|ci|test)(\(.*\))?:' \
              | sed -E 's/^(feat|fix|docs|refactor|perf|style|build)(\(.*\))?: *//' || true)
          fi
          [ -z "$BULLETS" ] && BULLETS="細かな改善と修正"
          LIS=$(printf '%s\n' "$BULLETS" \
            | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g' \
                  -e 's|^|          <li>|' -e 's|$|</li>|')
          cat > appcast.xml <<APPCAST
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>F</title>
              <item>
                <title>$VERSION</title>
                <pubDate>$PUB_DATE</pubDate>
                <sparkle:version>$VERSION</sparkle:version>
                <sparkle:shortVersionString>$VERSION</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>15.0</sparkle:minimumSystemVersion>
                <description><![CDATA[
                  <style>
                    body { font-family: -apple-system, sans-serif; font-size: 13px; margin: 12px 16px; }
                    ul { padding-left: 1.2em; margin: 0; }
                    li { margin: 4px 0; }
                    @media (prefers-color-scheme: dark) { body { color: #ddd; } }
                  </style>
                  <ul>
          $LIS
                  </ul>
                ]]></description>
                <enclosure
                  url="https://github.com/iemong/F/releases/download/v$VERSION/F-$VERSION.dmg"
                  $SIGNATURE_ATTRS
                  type="application/octet-stream"/>
              </item>
            </channel>
          </rss>
          APPCAST
          # ヒアドキュメントのインデントを除去
          sed -i '' 's/^          //' appcast.xml
          cat appcast.xml

      - name: Release作成 + DMG添付
        uses: softprops/action-gh-release@v2
        with:
          files: |
            F-*.dmg
            appcast.xml
          generate_release_notes: true
