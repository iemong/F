name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: パッケージテスト + アプリビルド
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Xcodeバージョン確認
        run: xcodebuild -version && swift --version

      - name: パッケージテスト
        run: |
          for pkg in DNGKit DecodeKit CacheKit XMPKit; do
            echo "=== $pkg ==="
            swift test --package-path "Packages/$pkg"
          done

      - name: アプリビルド (Release)
        run: |
          xcodebuild -project F.xcodeproj -scheme F -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO build
