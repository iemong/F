name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: パッケージテスト + アプリビルド
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: 秘密鍵・署名資材の追跡を検査
        run: |
          tracked="$(git ls-files '*.p8' '*.p12' '*.cer' '*.certSigningRequest' '*.mobileprovision')"
          if [ -n "$tracked" ]; then
            echo "::error::秘密鍵または署名資材がGitに追跡されています"
            printf '%s\n' "$tracked"
            exit 1
          fi

      - name: Xcodeバージョン確認
        run: xcodebuild -version && swift --version

      - name: パッケージテスト
        run: |
          for pkg in DNGKit DecodeKit CacheKit XMPKit AppCore; do
            echo "=== $pkg ==="
            swift test --package-path "Packages/$pkg"
          done

      - name: アプリビルド (Release)
        run: |
          xcodebuild -project F.xcodeproj -scheme F -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO build
